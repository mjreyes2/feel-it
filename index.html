<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feel It — Emotion Regulation Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #c9a96e; --gold-light: #e8c98a; --gold-dim: #7a6540; --cream: #c4b89a; }
    html, body { min-height: 100%; background: #0e0c09; display: flex; flex-direction: column; align-items: center; font-family: 'Cormorant Garamond', Georgia, serif; overflow-x: hidden; }
    header { text-align: center; padding: 3.5rem 2rem 0.5rem; }
    header h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem,5vw,3rem); font-weight: 400; letter-spacing: 0.35em; color: var(--gold); }
    header p  { font-size: 1rem; font-style: italic; color: var(--gold-dim); margin-top: 0.4rem; letter-spacing: 0.1em; }
    .divider-h { width: min(360px,70vw); height: 1px; background: linear-gradient(to right,transparent,var(--gold-dim),transparent); margin: 1.5rem auto; }

    .fan-arena { position: relative; width: 100%; height: 280px; flex-shrink: 0; }

    .card {
      position: absolute; width: 72px; height: 110px;
      transform-origin: 50% 100%; cursor: pointer;
      transition: left .55s cubic-bezier(.34,1.1,.64,1), top .55s cubic-bezier(.34,1.1,.64,1),
                  transform .55s cubic-bezier(.34,1.1,.64,1), opacity .4s ease;
      will-change: transform, left, top;
    }
    .card.chosen { cursor: default; pointer-events: none; }
    .card:not(.chosen):hover { z-index: 100 !important; }
    .card:not(.chosen):hover .card-inner { transform: translateY(-12px) scale(1.08); }
    .card-inner { width:100%; height:100%; transform-style:preserve-3d; transition:transform .35s ease; position:relative; border-radius:5px; }
    .card-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:5px; border:1px solid rgba(201,169,110,.28); overflow:hidden; }
    .card-front { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; padding:8px 5px; }
    .card-front::before,.card-front::after { content:''; position:absolute; width:10px; height:10px; border-color:rgba(201,169,110,.3); border-style:solid; }
    .card-front::before { top:5px; left:5px; border-width:1px 0 0 1px; }
    .card-front::after  { bottom:5px; right:5px; border-width:0 1px 1px 0; }
    .c-symbol { font-size:18px; line-height:1; }
    .c-name   { font-family:'Cinzel',serif; font-size:7.5px; font-weight:600; color:#e8c98a; letter-spacing:.04em; text-align:center; }
    .card-deco { background:#171410; display:flex; align-items:center; justify-content:center; }
    .deco-inner { width:calc(100% - 10px); height:calc(100% - 10px); border:1px solid rgba(201,169,110,.12); border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:16px; color:rgba(201,169,110,.08); }

    .divider-section { width:min(480px,85%); height:1px; background:linear-gradient(to right,transparent,rgba(201,169,110,.2),transparent); margin:6px auto 14px; }

    .stage-area { width:100%; min-height:260px; display:flex; align-items:center; justify-content:center; padding:0 24px; gap:16px; }
    .stage-placeholder { font-style:italic; font-size:14px; color:#3a3020; }

    .selected-card { width:150px; height:231px; position:relative; flex-shrink:0; cursor:pointer; }
    .selected-card .card-inner { width:100%; height:100%; transform-style:preserve-3d; transition:transform .7s cubic-bezier(.4,0,.2,1); border-radius:9px; position:relative; }
    .selected-card.flipped .card-inner { transform:rotateY(180deg); }
    .selected-card .card-face { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:9px; border:1px solid rgba(201,169,110,.4); overflow:hidden; }
    .selected-card .card-front { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:18px 14px; }
    .selected-card .card-front::before,.selected-card .card-front::after { content:''; position:absolute; width:20px; height:20px; border-color:rgba(201,169,110,.4); border-style:solid; }
    .selected-card .card-front::before { top:9px; left:9px; border-width:1px 0 0 1px; }
    .selected-card .card-front::after  { bottom:9px; right:9px; border-width:0 1px 1px 0; }
    .selected-card .c-symbol { font-size:36px; }
    .selected-card .c-name   { font-family:'Cinzel',serif; font-size:14px; font-weight:600; color:#e8c98a; letter-spacing:.07em; text-align:center; }
    .selected-card .c-tag    { font-style:italic; font-size:10px; color:#7a6540; text-align:center; line-height:1.35; }
    .selected-card .card-back { transform:rotateY(180deg); background:#100e0b; padding:13px 11px; display:flex; flex-direction:column; gap:7px; }
    .back-title { font-family:'Cinzel',serif; font-size:7.5px; letter-spacing:.14em; color:#c9a96e; text-align:center; border-bottom:1px solid rgba(201,169,110,.2); padding-bottom:6px; }
    .back-items { list-style:none; display:flex; flex-direction:column; gap:5px; }
    .back-items li { font-size:10px; line-height:1.38; color:var(--cream); display:flex; gap:5px; }
    .back-items li::before { content:'✦'; color:var(--gold-dim); font-size:6px; flex-shrink:0; margin-top:2px; }
    .stage-hint { font-style:italic; font-size:12px; color:#4a3e2e; max-width:160px; line-height:1.6; }

    .controls { display:flex; gap:12px; margin-top:16px; margin-bottom:.5rem; flex-wrap:wrap; justify-content:center; padding:0 20px; }
    .btn { font-family:'Cinzel',serif; font-size:10px; letter-spacing:.22em; padding:10px 24px; border:1px solid rgba(201,169,110,.4); background:transparent; color:var(--gold); cursor:pointer; transition:all .22s; border-radius:2px; }
    .btn:hover { background:rgba(201,169,110,.08); border-color:var(--gold); color:var(--gold-light); }
    .btn:active { transform:scale(.97); }
    .btn.primary { border-color:var(--gold); background:rgba(201,169,110,.07); }
    .status { font-style:italic; font-size:13px; color:#4a3e2e; margin-top:6px; margin-bottom:2.5rem; letter-spacing:.05em; min-height:20px; text-align:center; padding:0 1rem; }
  </style>
</head>
<body>
<header>
  <h1>Feel It</h1>
  <p>Emotion Regulation Cards</p>
</header>
<div class="divider-h"></div>
<div class="fan-arena" id="fanArena"></div>
<div class="divider-section"></div>
<div class="stage-area" id="stageArea">
  <div class="stage-placeholder" id="placeholder">Select a card from the fan above</div>
</div>
<div class="controls">
  <button class="btn primary" id="shuffleBtn">✦ Shuffle &amp; Spread</button>
  <button class="btn" id="gatherBtn">Gather deck</button>
</div>
<div class="status" id="status">Click the deck to begin</div>

<script>
const CARDS = [
  { symbol:'🌊', name:'Grief',       color:'#1a2535', tagline:'The ocean carrying what we\'ve lost',               actions:['I can let myself cry without apology','I can write to what — or who — I\'ve lost','I can move at my own pace through this','I can reach out to someone who loved them too'] },
  { symbol:'🔥', name:'Anger',       color:'#2a1810', tagline:'A signal that a boundary was crossed',              actions:['I can move my body to release this energy','I can write what I cannot say, then let it go','I can name what feels unjust beneath the rage','I can channel this into something I create'] },
  { symbol:'🌿', name:'Peace',       color:'#0e1a12', tagline:'The stillness I always carry within',               actions:['I can breathe slowly and notice what\'s around me','I can share this calm with someone who needs it','I can feel my feet on the ground, right now','I can rest here without guilt'] },
  { symbol:'🕯️', name:'Loneliness',  color:'#1a1525', tagline:'The ache of longing to be truly seen',             actions:['I can reach out to one person, even briefly','I can sit with this — it will not last forever','I can go somewhere I\'m around other people','I can remind myself I am not alone in this'] },
  { symbol:'⚡', name:'Anxiety',     color:'#1a1a0f', tagline:'My mind trying to keep me safe',                   actions:['I can name five things I can see right now','I can breathe in for 4 counts, out for 6','I can write the worry down and close the page','I can ask myself: is this happening right now?'] },
  { symbol:'☀️', name:'Joy',          color:'#1a1508', tagline:'Aliveness recognizing itself',                     actions:['I can share this — joy grows when given away','I can let myself feel it fully, without shrinking','I can write down exactly what is making me happy','I can call someone I love just to tell them'] },
  { symbol:'🌑', name:'Shame',       color:'#120d0d', tagline:'The wound of believing I am the mistake',          actions:['I can speak this aloud — shame fades in light','I can separate what I did from who I am','I can talk to someone safe, without the full story','I can write what a compassionate friend would say to me'] },
  { symbol:'🌸', name:'Tenderness',  color:'#1a0d14', tagline:'Love in its most open, vulnerable form',           actions:['I can stay in this softness without rushing','I can tell someone I love them, right now','I can let myself be moved by what is beautiful','I can turn this same gentleness toward myself'] },
  { symbol:'🌫️', name:'Numbness',    color:'#141414', tagline:'The quiet after too much feeling',                 actions:['I can be patient — this is also a response','I can do something small and physical','I can drink water and step outside briefly','I can trust that feeling will return in its own time'] },
  { symbol:'💫', name:'Hope',        color:'#0d1020', tagline:'The choice to believe in what might come',          actions:['I can write one thing I\'m looking forward to','I can take a small step toward what I\'m hoping for','I can share this hope with someone who will guard it','I can let hope be tentative — it doesn\'t need to be certain'] },
  { symbol:'🎭', name:'Envy',        color:'#101a0e', tagline:'A clue about what I secretly desire',              actions:['I can ask: what do I want that they seem to have?','I can use this as a compass, not a weapon','I can celebrate them anyway — it breaks the spell','I can take one small step toward what I actually want'] },
  { symbol:'🌬️', name:'Overwhelm',   color:'#0d1520', tagline:'More than this moment can hold at once',          actions:['I can do only the very next smallest thing','I can write everything out to clear my mind','I can say no to one thing today','I can ask for help with just one specific thing'] },
  { symbol:'🌹', name:'Love',        color:'#1a0a0c', tagline:'The force that makes life worth living',           actions:['I can express this — love unfelt and unspoken fades','I can be fully present with the people who matter','I can notice love living inside the small moments','I can begin by loving myself — it flows outward from there'] },
  { symbol:'🌀', name:'Confusion',   color:'#130e1a', tagline:'My mind asking for more information',              actions:['I can write the question I cannot yet answer','I can sit with "I don\'t know" — that\'s honest','I can break this into smaller, clearer questions','I can trust that clarity will come when it\'s ready'] },
  { symbol:'🦋', name:'Excitement',  color:'#0c100c', tagline:'Possibility wearing a bright new coat',            actions:['I can lean into this — the energy is mine to use','I can write down everything I want to happen','I can take one concrete action while I feel this','I can begin something before this feeling passes'] },
  { symbol:'🪨', name:'Frustration', color:'#181008', tagline:'The friction between here and where I want to be', actions:['I can name specifically what feels blocked','I can pause — pushing harder rarely helps here','I can ask myself what I actually control right now','I can release what I cannot change today'] },
  { symbol:'🌙', name:'Melancholy',  color:'#0e1020', tagline:'A beautiful sadness without sharp edges',          actions:['I can let music carry what words cannot','I can go slowly — this feeling asks for gentleness','I can write or draw without needing it to make sense','I can let myself be nostalgic, just for a while'] },
  { symbol:'🛡️', name:'Fear',        color:'#100e18', tagline:'My body asking: are we safe?',                    actions:['I can name the specific thing I\'m afraid of','I can ground myself — feet flat, slow steady breath','I can ask: what is the most likely outcome here?','I can talk to someone — fear only grows in silence'] },
  { symbol:'🌻', name:'Gratitude',   color:'#16100a', tagline:'Noticing the gifts already in my hands',          actions:['I can write three things I\'m grateful for, specifically','I can tell someone directly what they mean to me','I can slow down and fully inhabit this moment','I can pass something forward — give what I\'ve received'] },
  { symbol:'🫧', name:'Guilt',       color:'#0e1318', tagline:'My conscience pointing toward repair',             actions:['I can remember: this is about my action, not my worth','I can make amends — even a small gesture counts','I can apologize without explaining or defending myself','I can forgive myself — real growth has happened here'] },
];

const fanArena=document.getElementById('fanArena'),stageArea=document.getElementById('stageArea'),placeholder=document.getElementById('placeholder'),shuffleBtn=document.getElementById('shuffleBtn'),gatherBtn=document.getElementById('gatherBtn'),statusEl=document.getElementById('status');
let isSpread=false,shuffled=[...CARDS],cardEls=[],selectedIdx=-1;
const CARD_W=72,CARD_H=110;

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function buildCards(){
  fanArena.innerHTML='';cardEls=[];selectedIdx=-1;clearStage();
  shuffled.forEach((data,i)=>{
    const el=document.createElement('div');el.className='card';
    el.innerHTML=`<div class="card-inner"><div class="card-face card-front" style="background:${data.color};"><div class="c-symbol">${data.symbol}</div><div class="c-name">${data.name}</div></div><div class="card-face card-deco"><div class="deco-inner">✦</div></div></div>`;
    el.addEventListener('click',()=>{if(!isSpread){doShuffle();return;}selectCard(i,data,el);});
    cardEls.push(el);fanArena.appendChild(el);
  });
}

function stackCards(instant){
  const W=fanArena.offsetWidth||window.innerWidth||760;const cx=W/2;const n=cardEls.length;
  cardEls.forEach((el,i)=>{
    const offset=i*0.35,rot=(i-n/2)*0.12;
    if(instant)el.style.transition='none';
    el.style.left=(cx-CARD_W/2+offset)+'px';el.style.top=(100-offset)+'px';
    el.style.transform=`rotate(${rot}deg)`;el.style.zIndex=i+1;el.style.opacity='1';
    el.classList.remove('chosen');
    if(instant)requestAnimationFrame(()=>{el.style.transition='';});
  });
}

function spreadCards(){
  const W=fanArena.offsetWidth||window.innerWidth||760;
  const H=fanArena.offsetHeight||280;
  const n=cardEls.length;
  const PIVOT_Y=H+80;
  const R=PIVOT_Y;
  const PADDING=28;
  const availW=W-PADDING*2;
  const maxHalfAngle=Math.asin((availW/2)/R);
  const halfAngleDeg=Math.min((maxHalfAngle*180)/Math.PI,55);
  cardEls.forEach((el,i)=>{
    if(el.classList.contains('chosen'))return;
    const t=n===1?0:(i/(n-1)-0.5);
    const angleDeg=t*halfAngleDeg*2;
    const angleRad=angleDeg*Math.PI/180;
    const cardBottomX=W/2+R*Math.sin(angleRad);
    const cardBottomY=PIVOT_Y-R*Math.cos(angleRad);
    const left=cardBottomX-CARD_W/2;
    const top=cardBottomY-CARD_H;
    const delay=i*20;
    el.style.transition=`transform .5s cubic-bezier(.34,1.1,.64,1) ${delay}ms,left .5s cubic-bezier(.34,1.1,.64,1) ${delay}ms,top .5s cubic-bezier(.34,1.1,.64,1) ${delay}ms,opacity .35s ease ${delay}ms`;
    el.style.left=left+'px';el.style.top=top+'px';el.style.transform=`rotate(${angleDeg}deg)`;
    el.style.zIndex=i+1;el.style.opacity='1';el._rot=angleDeg;
  });
}

function sendCardAside(fanEl){
  const W=fanArena.offsetWidth||760;const cx=parseFloat(fanEl.style.left)+CARD_W/2;const goRight=cx>W/2;
  fanEl.style.transition='left .4s ease,top .4s ease,transform .4s ease,opacity .35s ease';
  fanEl.style.left=(goRight?W+20:-CARD_W-20)+'px';fanEl.style.top=(parseFloat(fanEl.style.top)+24)+'px';
  fanEl.style.transform=`rotate(${(fanEl._rot||0)+(goRight?14:-14)}deg)`;fanEl.style.opacity='0';fanEl.classList.add('chosen');
}

function selectCard(idx,data,fanEl){
  if(fanEl.classList.contains('chosen'))return;
  selectedIdx=idx;sendCardAside(fanEl);clearStage();buildStageCard(data);
  statusEl.textContent='Tap the card to reveal your "I can…" list';
}

function buildStageCard(data){
  placeholder.style.display='none';
  const wrap=document.createElement('div');wrap.className='selected-card';
  wrap.innerHTML=`<div class="card-inner"><div class="card-face card-front" style="background:${data.color};"><div class="c-symbol">${data.symbol}</div><div class="c-name">${data.name}</div><div class="c-tag">${data.tagline}</div></div><div class="card-face card-back" style="background:${data.color}ee;"><div class="back-title">Feeling ${data.name.toLowerCase()}, I can…</div><ul class="back-items">${data.actions.map(a=>`<li>${a}</li>`).join('')}</ul></div></div>`;
  wrap.style.cssText='opacity:0;transform:translateY(20px) scale(0.92);transition:opacity .4s ease,transform .45s cubic-bezier(.34,1.1,.64,1);';
  wrap.addEventListener('click',()=>wrap.classList.toggle('flipped'));
  const hint=document.createElement('div');hint.className='stage-hint';hint.textContent='Tap to flip and find what you can do';
  stageArea.appendChild(wrap);stageArea.appendChild(hint);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{wrap.style.opacity='1';wrap.style.transform='translateY(0) scale(1)';}));
}

function clearStage(){stageArea.innerHTML='';placeholder.style.display='block';stageArea.appendChild(placeholder);}
function doShuffle(){if(isSpread){gatherDeck(true);setTimeout(runShuffle,600);return;}runShuffle();}
function runShuffle(){
  isSpread=false;statusEl.textContent='Shuffling…';shuffle(shuffled);buildCards();stackCards(true);
  let wave=0;
  function animWave(){
    if(wave>=3){setTimeout(doSpread,150);return;}
    const dir=wave%2===0?1:-1;
    cardEls.forEach((el,i)=>{el.style.transition=`transform .18s ease ${i*8}ms`;el.style.transform=`rotate(${dir*8}deg) translateX(${dir*16}px)`;setTimeout(()=>{el.style.transform='rotate(0deg)';},180+i*8+40);});
    wave++;setTimeout(animWave,320+cardEls.length*8);
  }
  animWave();
}
function doSpread(){isSpread=true;spreadCards();statusEl.textContent='Select a card to draw it';}
function gatherDeck(silent){isSpread=false;selectedIdx=-1;clearStage();stackCards();if(!silent)statusEl.textContent='Deck gathered — shuffle & spread again';}

shuffleBtn.addEventListener('click',doShuffle);
gatherBtn.addEventListener('click',()=>gatherDeck(false));
window.addEventListener('resize',()=>{if(isSpread)spreadCards();else stackCards(true);});
buildCards();stackCards(true);
</script>
</body>
</html>
